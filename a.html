<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>F7V5 FA Rosa Asbuild</title>
    <style>
      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
      }
      body {
        font-family: 'Manrope',  sans-serif;
          background-color: #fffbe6;
        color: #333;
          border-radius: 10px;
        padding: 15px;
      }
      .w {
        color: #ff4d4f;
        font-weight: 700;
        font-size: 1.2rem;
        margin-bottom: 20px;
        border-radius: 8px;
        display: flex;
        align-items: center;
      }
      .sos-emoji {
        font-size: 1.8rem;
        color: #ff0000;
        font-weight: 900;
        animation: pulse 1.5s infinite;
        margin: 0 5px;
        text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        display: inline-block;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
      <div class="w">
        <span>⚠️</span>
        <span>Dear All: This is F7V5 FA Rosa Asbuild daily product data <span class="sos-emoji">🆘</span></span>
      </div>
  </body>
</html>
